<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doñana 316B - Sol Paraiso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">Doñana 316B</div>
        <nav>
            <a href="https://airbnb.com/h/solparaiso-torrox-park" target="_blank" rel="noopener noreferrer" class="btn-nav">
                Reservar Ahora
            </a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <span class="badge-location">TORROX PARK • COSTA DEL SOL</span>
            <h1>Sol Paraiso</h1>
            <p>Tu estancia exclusiva en un entorno idílico. Desconecta con total comodidad, piscina, vistas espectaculares y reserva inmediata garantizada.</p>
            <a href="https://airbnb.com/h/solparaiso-torrox-park" target="_blank" rel="noopener noreferrer" class="btn-disponibilidad">
                Consultar Disponibilidad
            </a>
        </div>
    </section>

    <main class="galeria-container">
        <h2>Galería de la Propiedad</h2>
        
        <div class="galeria-grid">
            <div class="img-card Destacada">
                <img src="galeria1.jpg" alt="Vista Impresionante 1" class="img-zoom">
            </div>
            <div class="img-card Destacada">
                <img src="galeria2.jpg" alt="Vista Impresionante 2" class="img-zoom">
            </div>
            <div class="img-card Destacada">
                <img src="galeria3.jpg" alt="Vista Impresionante 3" class="img-zoom">
            </div>
            <div class="img-card Destacada">
                <img src="galeria4.jpg" alt="Vista Impresionante 4" class="img-zoom">
            </div>

            <div class="img-card">
                <img src="galeria5.jpg" alt="Interior Doñana" class="img-zoom">
            </div>
            <div class="img-card">
                <img src="galeria6.jpg" alt="Detalle Propiedad" class="img-zoom">
            </div>
            <div class="img-card">
                <img src="galeria7.jpg" alt="Zona Común" class="img-zoom">
            </div>
            <div class="img-card">
                <img src="galeria8.jpg" alt="Entorno Torrox" class="img-zoom">
            </div>
        </div>
    </main>

    <div id="lightbox" class="hidden">
        <span id="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="Vista ampliada">
    </div>

    <script src="script.js"></script>
</body>
</html>
